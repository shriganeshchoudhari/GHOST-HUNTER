spring:
  application:
    name: ghost-hunter-backend

  main:
    allow-circular-references: true

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

  datasource:
    url: jdbc:postgresql://localhost:5432/ghost_hunter
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ✅ FIXED: spring.redis → spring.data.redis + jedis → lettuce
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080
          jwk-set-uri: http://localhost:8080/.well-known/jwks.json

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 8081
  servlet:
    context-path: /api/v1
  compression:
    enabled: true
    min-response-size: 1024
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    root: INFO
    com.ghosthunter: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
    "[org.hibernate.SQL]": DEBUG
    "[org.hibernate.type.descriptor.sql.BasicBinder]": TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/ghost-hunter.log
    max-size: 10MB
    max-history: 30

# ⚠️ works only if actuator dependency is present
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:your-secret-key-change-in-production}
    expiration: 3600000
    refresh-expiration: 2592000000

  cors:
    allowed-origins: http://localhost:3000,http://localhost:19006
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

  api:
    base-url: http://localhost:8080/api/v1
    rate-limit:
      enabled: true
      requests-per-minute: 60

  file-upload:
    max-size: 10485760
    allowed-types: image/jpeg,image/png,image/gif,video/mp4
    storage-path: /tmp/ghost-hunter

# ⚠️ works only if flyway dependency is present
flyway:
  enabled: true
  locations: classpath:db/migration
  baseline-on-migrate: true